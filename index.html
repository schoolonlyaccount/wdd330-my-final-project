<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic Meta -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kell's Video Game Statistics</title>
    <meta name="author" content="Kell Brine">
    <meta name="description"
        content="This is the home page of Kell's Video Game Statistics. Here, you can view the top sellers, top wishlisted, and top currently played games.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" href="favicon.ico">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/large.css">
    <link rel="stylesheet" href="styles/small.css">

    <!-- JavaScript -->
    <script src="js/main.js" type="module"></script>
</head>

<body>
    <header>
        <!-- Logo & Title -->
        <div>
            <img src="favicon.ico" width="128" height="128" loading="lazy" alt="Image of a old school controller">
            <span>Kell's Video Game Statistics</span>
        </div>
    </header>

    <main>
        <h1>Home</h1>

        <!-- A Welcome Message that is different depending on how long the user has visited -->
        <p id="welcome-message"></p>

        <!-- View Switching Buttons & The Games -->
        <div id="view-container">
            <!-- View Switch-->
            <section id="view-switch-buttons">
                <button id="top-spots-button">View Top Spot For Each Category</button>
                <button id="top-sellers-button">View Top Sellers</button>
                <button id="top-wishlist-button">View Top Wishlisted</button>
            </section>

            <!-- Shows The Last Game The User Viewed -->
            <p id="last-viewed-game"></p>

            <!-- Views -->
            <section id="top-spots-view" class="view"></section>
            <section id="top-sellers-view" class="view"></section>
            <section id="top-wishlist-view" class="view"></section>

            <!-- A Game's Details-->
            <dialog id="game-details">
                <div class="game-details-container"></div>
                <button class="close-dialog">Close</button>
            </dialog>
        </div>
    </main>

    <footer>
        <p>© 2026 | Kell Brine | WDD 330 Final Project</p>
    </footer>
</body>

</html>
