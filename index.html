<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic Meta -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kell's Video Game Statistics</title>
    <meta name="author" content="Kell Brine">
    <meta name="description"
        content="This is the home page of Kell's Video Game Statistics. Here, you can view the top sellers, top wishlisted, and top currently played games.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" href="favicon.ico">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/normalization.css">

    <!-- JavaScript -->
    <script src="js/main.js" type="module"></script>
</head>

<body>
    <header>
        <!-- Logo & Title -->
        <div>
            <img src="favicon.ico" width="128" height="128" loading="lazy" alt="Image of a old school controller">
            <span>Kell's Video Game Statistics</span>
        </div>
    </header>

    <main>
        <h1>Home</h1>

        <!-- View Switching Buttons & The Games -->
        <div>
            <section id="view-switch-buttons">
                <button id="top-spots">#1 Spot For Each Category</button>
                <button id="best-sellers">Top 10 Best Sellers</button>
                <button id="most-wishlisted">Top 10 Most Wishlisted</button>
                <button id="most-currently-played">Top 10 Most Currently Played</button>
            </section>

            <section id="game-cards"></section>
        </div>
    </main>

    <footer>
        <p>© 2026 | Kell Brine | WDD 330 Final Project</p>
    </footer>
</body>

</html>
